<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ai:key" content="YOUR_OPENROUTER_KEY">
  <meta name="ai:model" content="anthropic/claude-sonnet-4">
  <title>ai.js demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Phase 1: Code editor */
    #editor {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: opacity 0.6s ease;
    }

    #editor.hidden { opacity: 0; pointer-events: none; }

    .title-bar {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #28c840; }

    .title-bar span {
      margin-left: 12px;
      color: #888;
      font-size: 13px;
    }

    #code-area {
      flex: 1;
      background: #0a0a0a;
      padding: 32px 40px;
      font-size: 20px;
      line-height: 1.7;
      white-space: pre;
      overflow: hidden;
    }

    .tag { color: #ff79c6; }
    .attr { color: #50fa7b; }
    .str { color: #f1fa8c; }
    .text { color: #8be9fd; }
    .comment { color: #6272a4; }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #f8f8f2;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Phase 2: Browser result */
    #result {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      overflow-y: auto;
    }

    #result.visible { opacity: 1; pointer-events: all; }

    /* Watermark */
    #watermark {
      position: fixed;
      bottom: 20px;
      right: 24px;
      font-size: 16px;
      color: rgba(255,255,255,0.3);
      z-index: 999;
      font-family: system-ui, sans-serif;
      transition: color 0.6s;
    }

    #watermark.dark { color: rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <!-- Phase 1: Fake code editor -->
  <div id="editor">
    <div class="title-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span>index.html</span>
    </div>
    <div id="code-area"></div>
  </div>

  <!-- Phase 2: Live result -->
  <div id="result"></div>

  <div id="watermark">&lt;ai&gt;</div>

  <script>
    // The "code" we'll type out (raw chars, we'll syntax-highlight as we go)
    const SOURCE = `<!DOCTYPE html>
<html>
<head>
  <meta name="ai:key" content="sk-or-•••">
  <script src="ai.js"><\/script>
</head>
<body>

  <ai>
    Build me a billion-dollar B2B SaaS landing page.
    Make no mistakes. Go all out. Inline styles.
    Hero section, gradient, social proof, pricing,
    testimonials, FAQ, footer. Ship it.
  </ai>

</body>
</html>`;

    const codeArea = document.getElementById("code-area");
    const editor = document.getElementById("editor");
    const result = document.getElementById("result");
    const watermark = document.getElementById("watermark");

    function highlight(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        // tags
        .replace(/(&lt;\/?)([\w!-]+)/g, '<span class="tag">$1$2</span>')
        .replace(/([\w-]+)(=)/g, '<span class="attr">$1</span>$2')
        .replace(/("(?:sk-or-•••|[^"]*)")/g, '<span class="str">$1</span>')
        // the ai prompt text (lines that don't have tags)
        ;
    }

    // Phase 1: Type out the code
    async function typeCode() {
      let i = 0;
      const speed = { normal: 28, fast: 8 };

      return new Promise((resolve) => {
        function tick() {
          if (i >= SOURCE.length) {
            // Remove cursor, wait, then resolve
            codeArea.innerHTML = highlight(SOURCE.slice(0, i));
            setTimeout(resolve, 1500);
            return;
          }

          i++;
          const current = SOURCE.slice(0, i);
          codeArea.innerHTML = highlight(current) + '<span class="cursor"></span>';

          // Type faster through boilerplate, slower through the prompt
          const inPrompt = current.includes("<ai>") && !current.includes("</ai>");
          const delay = inPrompt ? speed.normal : speed.fast;

          // Pause briefly at newlines
          const char = SOURCE[i - 1];
          const extra = char === "\n" ? 80 : 0;

          setTimeout(tick, delay + extra);
        }
        tick();
      });
    }

    // Phase 2: Call the real LLM with streaming
    async function streamResult() {
      editor.classList.add("hidden");
      watermark.classList.add("dark");
      result.classList.add("visible");

      const key = document.querySelector('meta[name="ai:key"]').content;
      const model = document.querySelector('meta[name="ai:model"]').content;

      const prompt = `Build me a billion-dollar B2B SaaS landing page. Make no mistakes. Go all out. Use only inline styles (no classes). Hero section with bold gradient, social proof logos, feature grid, pricing tiers, testimonials, FAQ accordion, and footer. Make it look like a YC demo day product. Ship-quality HTML.`;

      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${key}`,
        },
        body: JSON.stringify({
          model,
          stream: true,
          messages: [
            { role: "system", content: "You are an HTML generator. Return ONLY raw HTML with inline styles. No markdown fences, no explanation, no ```html blocks. Just pure HTML content ready to be injected into a page." },
            { role: "user", content: prompt },
          ],
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = "";
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith("data: ")) continue;
          const payload = trimmed.slice(6);
          if (payload === "[DONE]") break;
          try {
            const json = JSON.parse(payload);
            const delta = json.choices?.[0]?.delta?.content;
            if (delta) {
              full += delta;
              result.innerHTML = full;
            }
          } catch (_) {}
        }
      }
    }

    // Go
    (async () => {
      await new Promise(r => setTimeout(r, 800)); // brief pause before starting
      await typeCode();
      await streamResult();
    })();
  </script>
</body>
</html>
