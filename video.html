<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="ai:model" content="openai/gpt-oss-120b:groq">
  <title>ai.js demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Phase 1: Code editor */
    #editor {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: opacity 0.6s ease;
    }

    #editor.hidden { opacity: 0; pointer-events: none; }

    .title-bar {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #28c840; }

    .title-bar span {
      margin-left: 12px;
      color: #888;
      font-size: 13px;
    }

    #code-area {
      flex: 1;
      background: #0a0a0a;
      padding: 32px 40px;
      font-size: 20px;
      line-height: 1.7;
      white-space: pre;
      overflow: hidden;
    }

    .tag { color: #ff79c6; }
    .attr { color: #50fa7b; }
    .str { color: #f1fa8c; }
    .text { color: #8be9fd; }
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #f8f8f2;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Phase 2: Split view */
    #split {
      position: fixed;
      inset: 0;
      display: flex;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #split.visible { opacity: 1; pointer-events: all; }

    #raw-pane {
      width: 45%;
      background: #0a0a0a;
      border-right: 2px solid #333;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #raw-pane .title-bar span { color: #888; }

    #raw-code {
      flex: 1;
      padding: 16px 20px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      color: #a0a0a0;
      overflow-y: auto;
    }

    #rendered-pane {
      width: 55%;
      background: white;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #rendered-pane .title-bar {
      background: #f5f5f5;
      border-bottom: 1px solid #ddd;
    }

    #rendered-pane .title-bar span { color: #888; }
    #rendered-pane .url-bar {
      margin-left: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 12px;
      color: #666;
      flex: 1;
      max-width: 300px;
    }

    #rendered-content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    /* Watermark */
    #watermark {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: rgba(255,255,255,0.25);
      z-index: 999;
      font-family: system-ui, sans-serif;
      letter-spacing: 0.5px;
      transition: color 0.6s;
    }

    #split.visible ~ #watermark { color: rgba(0,0,0,0.15); }
  </style>
</head>
<body>

  <!-- Phase 1: Fake code editor -->
  <div id="editor">
    <div class="title-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span>index.html</span>
    </div>
    <div id="code-area"></div>
  </div>

  <!-- Phase 2: Split view -->
  <div id="split">
    <div id="raw-pane">
      <div class="title-bar">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <span>source</span>
      </div>
      <div id="raw-code"></div>
    </div>
    <div id="rendered-pane">
      <div class="title-bar">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <span class="url-bar">localhost:3000</span>
      </div>
      <div id="rendered-content"></div>
    </div>
  </div>

  <div id="watermark">&lt;ai&gt;</div>

  <script>
    const SOURCE = `<!DOCTYPE html>
<html>
<head>
  <meta name="ai:key" content="sk-or-•••">
  <script src="ai.js"><\/script>
</head>
<body>

  <ai>
    A landing page for an enterprise AI
    startup. Inline styles only. Ship it.
  </ai>

</body>
</html>`;

    const codeArea = document.getElementById("code-area");
    const editor = document.getElementById("editor");
    const split = document.getElementById("split");
    const rawCode = document.getElementById("raw-code");
    const rendered = document.getElementById("rendered-content");

    function escapeHtml(text) {
      return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function highlight(text) {
      return escapeHtml(text)
        .replace(/(&lt;\/?)([\w!-]+)/g, '<span class="tag">$1$2</span>')
        .replace(/([\w-]+)(=)/g, '<span class="attr">$1</span>$2')
        .replace(/("(?:sk-or-•••|[^"]*)")/g, '<span class="str">$1</span>');
    }

    async function typeCode() {
      let i = 0;
      return new Promise((resolve) => {
        function tick() {
          if (i >= SOURCE.length) {
            codeArea.innerHTML = highlight(SOURCE);
            setTimeout(resolve, 1200);
            return;
          }
          i++;
          codeArea.innerHTML = highlight(SOURCE.slice(0, i)) + '<span class="cursor"></span>';
          const inPrompt = SOURCE.slice(0, i).includes("<ai>") && !SOURCE.slice(0, i).includes("</ai>");
          const delay = inPrompt ? 30 : 10;
          const extra = SOURCE[i - 1] === "\n" ? 60 : 0;
          setTimeout(tick, delay + extra);
        }
        tick();
      });
    }

    async function streamResult() {
      editor.classList.add("hidden");
      split.classList.add("visible");

      let key = localStorage.getItem("ai:key");
      if (!key) {
        key = prompt("Enter your OpenRouter API key:");
        if (key) localStorage.setItem("ai:key", key);
      }
      const model = document.querySelector('meta[name="ai:model"]').content;

      const prompt = `Build a single landing page for an enterprise AI startup called "Nexus AI". Use only inline styles, no external CSS or classes. Include: hero with gradient, one feature grid, one pricing section, a footer. Keep it to one clean page. Return ONLY the HTML.`;

      const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${key}`,
        },
        body: JSON.stringify({
          model,
          stream: true,
          messages: [
            { role: "system", content: "You are an HTML generator. Return ONLY raw HTML with inline styles. No markdown fences, no explanation, no ```html blocks. Just pure HTML." },
            { role: "user", content: prompt },
          ],
        }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = "";
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith("data: ")) continue;
          const payload = trimmed.slice(6);
          if (payload === "[DONE]") break;
          try {
            const json = JSON.parse(payload);
            const delta = json.choices?.[0]?.delta?.content;
            if (delta) {
              full += delta;
              rawCode.textContent = full;
              rendered.innerHTML = full;
              // Auto-scroll both panes to bottom
              rawCode.scrollTop = rawCode.scrollHeight;
              rendered.scrollTop = rendered.scrollHeight;
            }
          } catch (_) {}
        }
      }
    }

    (async () => {
      await new Promise(r => setTimeout(r, 600));
      await typeCode();
      await streamResult();
    })();
  </script>
</body>
</html>
